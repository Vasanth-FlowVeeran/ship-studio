<script>(function(){
if(window.__ssSelectInit)return;window.__ssSelectInit=true;
var active=false,hoverBox=null,selBoxes=[],selectedSet=[];
/* The class each currently-selected element had BEFORE any live mutation, so we can
   revert an unsaved preview when the user deselects. Without this, re-selecting reads
   the mutated class (not a source literal) and the element wrongly reports as "not
   editable". Live style is previewed via an injected stylesheet (see below), not inline
   styles, so a breakpoint edit (md:p-8) only shows at its width — inline styles can't. */
var origClasses=[];
/* Preview stylesheet, keyed by a per-selection marker attribute (data-ss-sel="N").
   pvSheet[mark] = the CSS text for that selection; the sheet is the concatenation of
   all entries. pendingMark is the marker of the current UNCOMMITTED edit (cleared on
   commit) — only a pending edit is reverted on deselect; a committed one persists
   (its class is saved and HMR will recompile the real CSS, mirroring the old inline
   behavior that kept saved edits visible after the panel closed). */
var pvSheet={},curMark=null,pendingMark=null,pvId=0,styleEl=null;
function mk(c){var d=document.createElement('div');d.style.cssText='position:fixed;pointer-events:none;z-index:2147483646;border:2px solid '+c+';box-sizing:border-box;border-radius:2px';d.setAttribute('data-ss-overlay','1');document.body.appendChild(d);return d;}
function ensureHover(){if(!hoverBox)hoverBox=mk('rgba(96,165,250,.8)');}
function ensureSel(n){while(selBoxes.length<n)selBoxes.push(mk('rgba(217,119,87,.95)'));}
function editable(el){while(el&&el!==document.body){if(el.nodeType===1){var c=el.getAttribute&&el.getAttribute('class');if(c&&c.trim())return el;}el=el.parentElement;}return null;}
function place(box,el){if(!box)return;if(!el){box.style.display='none';return;}var r=el.getBoundingClientRect();box.style.display='block';box.style.top=r.top+'px';box.style.left=r.left+'px';box.style.width=r.width+'px';box.style.height=r.height+'px';}
function placeSet(){ensureSel(selectedSet.length);for(var i=0;i<selBoxes.length;i++)place(selBoxes[i],selectedSet[i]||null);}
/* All elements whose class attribute is identical to the clicked element's — these
   render from the same source literal (e.g. a .map), so a source edit changes all. */
function matching(el){var c=el.getAttribute('class'),out=[],all=document.querySelectorAll('[class]');for(var i=0;i<all.length;i++){if(all[i].getAttribute('class')===c)out.push(all[i]);}return out;}
function sig(el){var anc=[],p=el.parentElement,n=0;while(p&&p!==document.body&&n<8){var c=p.getAttribute('class');if(c&&c.trim()){anc.push(c);n++;}p=p.parentElement;}var r=el.getBoundingClientRect();var cs=getComputedStyle(el);return{className:el.getAttribute('class')||'',tagName:(el.tagName||'').toLowerCase(),text:(el.textContent||'').trim().slice(0,40),ancestorClasses:anc,rect:{top:r.top,left:r.left,width:r.width,height:r.height},computedColor:cs.color,computedBackgroundColor:cs.backgroundColor};}
function ensureStyle(){if(!styleEl){styleEl=document.createElement('style');styleEl.id='ss-preview';document.head.appendChild(styleEl);}return styleEl;}
function rebuildSheet(){var css='';for(var k in pvSheet)css+=pvSheet[k];ensureStyle().textContent=css;}
/* Build the preview CSS for one selection: each {minPx,decls} becomes a rule keyed to
   the marker, base (minPx 0) bare and variants wrapped in @media, emitted ascending by
   minPx so a larger breakpoint wins by source order. !important is safe — the sheet is
   preview-only and discarded on reload — and removes specificity fights with the page. */
function buildCss(mark,rules){rules=rules.slice().sort(function(a,b){return a.minPx-b.minPx;});var sel='[data-ss-sel="'+mark+'"]',out='';for(var i=0;i<rules.length;i++){var decl='';for(var p in rules[i].decls)decl+=p+':'+rules[i].decls[p]+' !important;';if(!decl)continue;var block=sel+'{'+decl+'}';out+=rules[i].minPx>0?'@media (min-width:'+rules[i].minPx+'px){'+block+'}':block;}return out;}
/* Discard the current selection's UNCOMMITTED preview (revert class, drop its rule +
   marker). A committed selection is kept as-is — only the live pointer is released. */
function restoreSel(){if(curMark!==null&&pendingMark===curMark){delete pvSheet[curMark];rebuildSheet();for(var i=0;i<selectedSet.length;i++){var el=selectedSet[i];if(!el)continue;if(origClasses[i]!=null)el.setAttribute('class',origClasses[i]);el.removeAttribute('data-ss-sel');}}curMark=null;pendingMark=null;selectedSet=[];origClasses=[];}
function snapshotOrig(){origClasses=[];for(var i=0;i<selectedSet.length;i++)origClasses.push(selectedSet[i]?selectedSet[i].getAttribute('class'):null);}
function onMove(e){if(!active)return;ensureHover();place(hoverBox,editable(e.target));}
function onClick(e){if(!active)return;var el=editable(e.target);if(!el)return;e.preventDefault();e.stopPropagation();restoreSel();selectedSet=matching(el);curMark=String(++pvId);for(var i=0;i<selectedSet.length;i++)selectedSet[i].setAttribute('data-ss-sel',curMark);snapshotOrig();placeSet();place(hoverBox,null);window.parent.postMessage({type:'ss:select',signature:sig(el),count:selectedSet.length},'*');}
function reposition(){if(active)placeSet();}
window.addEventListener('message',function(e){var d=e.data||{};
if(d.type==='ss:activate'){active=true;ensureHover();document.documentElement.style.cursor='crosshair';}
else if(d.type==='ss:deactivate'){active=false;restoreSel();place(hoverBox,null);for(var i=0;i<selBoxes.length;i++)place(selBoxes[i],null);document.documentElement.style.cursor='';}
else if(d.type==='ss:mutate'){for(var i=0;i<selectedSet.length;i++){var el=selectedSet[i];if(!el)continue;if(typeof d.className==='string')el.setAttribute('class',d.className);}if(curMark!==null&&d.rules){pvSheet[curMark]=buildCss(curMark,d.rules);pendingMark=curMark;rebuildSheet();}placeSet();}
/* Edit was saved to source: clear the pending flag so the preview rule + class are kept
   (no longer reverted on deselect/deactivate) and re-baseline the class. HMR re-renders
   from source and the real compiled CSS takes over. */
else if(d.type==='ss:commit'){pendingMark=null;snapshotOrig();}});
document.addEventListener('mousemove',onMove,true);
document.addEventListener('click',onClick,true);
window.addEventListener('scroll',reposition,true);
window.addEventListener('resize',reposition,true);
})()</script>
